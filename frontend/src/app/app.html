<canvas #networkCanvas class="bg-canvas"></canvas>
<div class="app-container">
  
  <!-- Intro Screen -->
  <div class="intro-screen glass-panel" *ngIf="!isAvatarUploaded">
    <div class="intro-content fade-in">
      <div class="intro-icon">✨</div>
      <h1>Welcome to AI Avatar Chat</h1>
      <p>Please select an image to serve as your digital avatar.</p>
      
      <div class="upload-area">
        <input type="file" id="avatar-upload" (change)="imageToBase64($event)" accept="image/*" class="file-input">
        <label for="avatar-upload" class="upload-btn">
          <span class="btn-text">Choose Avatar</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Main Screen -->
  <div class="main-screen fade-in" *ngIf="isAvatarUploaded">
    
    <!-- Top Bar -->
    <header class="top-bar glass-panel">
      <h2>AI Avatar Chat</h2>
      <button class="reset-btn" (click)="resetAvatar()">Start Over</button>
    </header>

    <div class="content-wrapper">
      
      <!-- Left Side: Chat -->
      <section class="chat-section glass-panel">
        
        <div class="chat-window" #chatScroll>
          <div class="empty-state" *ngIf="messages.length === 0">
            <p>Say hello to your avatar! 👋</p>
          </div>

          <div class="message-wrapper" *ngFor="let msg of messages" [ngClass]="msg.role === 'user' ? 'message-user' : 'message-bot'">
            <span class="message-sender">{{ msg.role === 'user' ? 'You' : 'Avatar' }}</span>
            <div class="message-bubble fade-in-up">
              {{ msg.content }}
            </div>
          </div>
          
          <div class="message-wrapper message-bot" *ngIf="isLoading">
            <span class="message-sender">Avatar</span>
            <div class="message-bubble typing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>

        <div class="input-area">
          <input 
            type="text" 
            [(ngModel)]="userText" 
            (keyup.enter)="sendMessage()"
            placeholder="Type your message..." 
            class="chat-input"
            [disabled]="isLoading">
          
          <button 
            class="send-btn"
            (click)="sendMessage()" 
            [disabled]="isLoading || userText.trim() === ''">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </section>

      <!-- Right Side: Avatar -->
      <section class="avatar-section glass-panel">
        <div class="avatar-display fade-in">
          <img [src]="currentAvatar" alt="Avatar" class="avatar-img" [ngClass]="{'loading': isLoading}">
        </div>

        <div class="emotion-panel fade-in-up" *ngIf="emotionResult">
          <button class="toggle-emotion-btn" (click)="toggleExplanation()">
            {{ showExplanation ? 'Hide Emotion Details' : 'View Emotion Details' }}
          </button>
          
          <div class="emotion-details glass-panel-inner" *ngIf="showExplanation">
            <p class="dominant-emotion">Detected: <strong>{{ emotionResult.dominant_emotion | uppercase }}</strong></p>
            <div class="emotion-distribution">
              <div class="emotion-bar" *ngFor="let item of emotionResult.emotions_array | keyvalue">
                <span class="emotion-label">{{ item.key }}</span>
                <div class="bar-track">
                  <div class="bar-fill" [style.width.%]="item.value"></div>
                </div>
                <span class="emotion-value">{{ item.value }}%</span>
              </div>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>

</div>
