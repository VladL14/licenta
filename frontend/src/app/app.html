<div class="main-container" style="font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
  
  <h1 style="text-align: center; color: #333;">AI Chat</h1>

  <div class="section" style="margin-bottom: 20px; text-align: center;" *ngIf="!imageCode">
    <h3>Pasul 1: Încarcă un Avatar</h3>
    <input type="file" (change)="imageToBase64($event)" accept="image/*">
  </div>

  <div *ngIf="imageCode">
    
    <div style="text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee;">
      <img [src]="currentAvatar" alt="Avatar" style="max-width: 200px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
      
      <div *ngIf="emotionResult" style="margin-top: 10px;">
        <button (click)="toggleExplanation()" style="background: #e0e0e0; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;">
          {{ showExplanation ? 'Ascunde Detalii' : 'Explicație Emoție' }}
        </button>
        
        <div *ngIf="showExplanation" style="text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 14px;">
          <p><strong>Emoție detectată:</strong> {{ emotionResult.dominant_emotion | uppercase }}</p>
          <p style="margin-bottom: 5px;"><strong>Distribuție:</strong></p>
          <ul style="margin-top: 0;">
            <li *ngFor="let item of emotionResult.emotions_array | keyvalue">
              {{ item.key }}: {{ item.value }}%
            </li>
          </ul>
        </div>
      </div>
    </div>

    <div class="chat-window" style="height: 300px; overflow-y: auto; background: #fafafa; border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin-bottom: 15px;">
      
      <p *ngIf="messages.length === 0" style="text-align: center; color: #888;">Please enter a message !</p>

      <div *ngFor="let msg of messages" style="margin-bottom: 15px;">
        <div [ngStyle]="{'text-align': msg.role === 'user' ? 'right' : 'left'}">
          <span style="font-size: 11px; color: #777; display: block; margin-bottom: 3px;">
            {{ msg.role === 'user' ? 'TU' : 'AVATAR' }}
          </span>
          <span [ngStyle]="{
            'display': 'inline-block',
            'padding': '10px 14px',
            'border-radius': '15px',
            'background-color': msg.role === 'user' ? '#007bff' : '#e9ecef',
            'color': msg.role === 'user' ? 'white' : 'black',
            'text-align': 'left'
          }">
            {{ msg.content }}
          </span>
        </div>
      </div>
      
      <div *ngIf="isLoading" style="text-align: left; margin-bottom: 15px;">
        <span style="display: inline-block; padding: 10px 14px; border-radius: 15px; background-color: #e9ecef; color: #888; font-style: italic;">
          Analizează și generează...
        </span>
      </div>
    </div>

    <div style="display: flex; gap: 10px;">
      <input 
        type="text" 
        [(ngModel)]="userText" 
        (keyup.enter)="sendMessage()"
        placeholder="Scrie un mesaj..." 
        style="flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
      
      <button 
        (click)="sendMessage()" 
        [disabled]="isLoading || userText.trim() === ''"
        style="padding: 12px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        Trimite
      </button>
    </div>

  </div>
</div>
